services:
  db:
    image: pgvector/pgvector:pg17
    container_name: szabalymester-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-szabalymester}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-szabalymester}
      POSTGRES_DB: ${POSTGRES_DB:-szabalymester}
    ports:
      # Csak a loopbackre publikálunk — dev-adatbázis, ne legyen a hálózaton elérhető.
      - '127.0.0.1:${POSTGRES_PORT:-5432}:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Friss adatbázisnál az initdb automatikusan lefuttatja a sémát; meglévő
      # kötetnél a `pnpm db:schema` alkalmazza idempotensen ugyanezt a fájlt.
      - ./db/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'pg_isready -U ${POSTGRES_USER:-szabalymester} -d ${POSTGRES_DB:-szabalymester}',
        ]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:

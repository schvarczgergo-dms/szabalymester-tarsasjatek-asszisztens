services:
  db:
    image: pgvector/pgvector:pg17
    container_name: szabalymester-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-szabalymester}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-szabalymester}
      POSTGRES_DB: ${POSTGRES_DB:-szabalymester}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'pg_isready -U ${POSTGRES_USER:-szabalymester} -d ${POSTGRES_DB:-szabalymester}',
        ]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
